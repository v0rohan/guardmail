{% extends "base.html" %}
{% block title %}{{ code }} - GuardMail{% endblock %}
{% block content %}
<main class="flex-1 flex flex-col items-center justify-center px-4 py-24 text-center">
    <p class="font-display text-7xl font-semibold text-zinc-700">{{ code }}</p>
    <h1 class="font-display text-2xl font-semibold text-white mt-3">{{ heading }}</h1>
    <p class="text-sm text-zinc-400 mt-2 max-w-sm leading-relaxed">{{ message }}</p>
    <a href="/" class="mt-8 inline-flex items-center space-x-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-200 text-sm font-semibold py-2.5 px-5 rounded-xl transition">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back to GuardMail</span>
    </a>
</main>
{% endblock %}
