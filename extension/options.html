<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GuardMail AI - Settings</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            padding: 24px;
            max-width: 420px;
        }
        h1 { font-size: 16px; margin-bottom: 4px; }
        p.hint { font-size: 12px; color: #64748b; margin-top: 0; margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            font-size: 13px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }
        button {
            margin-top: 12px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            background: #4f46e5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #status { margin-left: 10px; font-size: 12px; color: #059669; }
    </style>
</head>
<body>
    <h1>GuardMail AI Settings</h1>
    <p class="hint">Where should the extension send emails for scanning? Point this at your deployed GuardMail backend instead of localhost once you've shipped it.</p>
    <label for="backend-url">Backend URL</label>
    <input type="text" id="backend-url" placeholder="http://127.0.0.1:3000">
    <div>
        <button id="save-btn">Save</button>
        <span id="status"></span>
    </div>
    <script src="options.js"></script>
</body>
</html>
